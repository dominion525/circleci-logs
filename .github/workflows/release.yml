name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  build:
    name: Build (${{ matrix.target }})
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: tar czf circleci-logs-${{ matrix.target }}.tar.gz -C target/release circleci-logs

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path target/release/circleci-logs.exe -DestinationPath circleci-logs-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: circleci-logs-${{ matrix.target }}
          path: circleci-logs-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          prerelease=""
          if echo "$tag" | grep -qE '(alpha|beta|rc)'; then
            prerelease="--prerelease"
          fi
          gh release create "$tag" $prerelease --generate-notes artifacts/*
